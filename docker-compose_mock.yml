services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: iot-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_CLUSTER_ID=5L6g3nShT-eMCtK--X86sw
    volumes:
      - kafka_data:/bitnami/kafka
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: iot-mongodb
    ports:
      - "27017:27017"
    command: ["--setParameter", "ttlMonitorSleepSecs=60"]
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: iot-frontend
    working_dir: /app
    volumes:
      - ./apps/web:/app
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    environment:
      - VITE_API_URL=http://iot-backend:8000
      - VITE_BROKER_URL=http://iot-broker:8080
    ports:
      - "5173:5173"
    depends_on:
      - iot_backend
      - broker

  iot_backend:
    build:
      context: ./services/iot-backend
      dockerfile: Dockerfile
    container_name: iot-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/iot.db
    user: "0:0"
    volumes:
      - iot_backend_data:/app/data
    networks:
      default:
        aliases:
          - backend

  broker:
    build:
      context: ./services/PubSub_Server
      dockerfile: Dockerfile
    container_name: iot-broker
    ports:
      - "1883:1883"
      - "8080:8080"
    environment:
      - BROKER_HOST=0.0.0.0
      - BROKER_PORT=1883
      - AUTH_VERIFY_URL=http://iot-backend:8000/internal/verify-credentials
      - STUB_AUTH=false
      - LOG_LEVEL=INFO
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MONGO_URI=mongodb://mongodb:27017
    depends_on:
      - iot_backend
      - kafka
      - mongodb

  backend:
    build:
      context: ./services/iot-backend
      dockerfile: Dockerfile
    container_name: iot-backend-shadow
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/iot.db
    user: "0:0"
    volumes:
      - iot_backend_data:/app/data
    depends_on:
      - iot_backend

volumes:
  kafka_data:
    driver: local
  mongodb_data:
    driver: local
  iot_backend_data:
    driver: local
