# ── IoT Platform Docker Compose ──────────────────────────────────────────────
# Architecture: 2 subsystems sharing Kafka + MongoDB
#
#   Subsystem 1 — Custom PubSub Broker:
#     broker      → TCP :10001 (devices) + API :8080 (queries)
#
#   Infrastructure:
#     kafka       → KRaft mode (no Zookeeper), port 9092
#     mongodb     → Time Series + TTL auto-expiry, port 27017
#
# Usage:
#   docker compose up -d                    # start all
#   docker compose up -d --build broker     # rebuild broker only
#   docker compose logs -f broker           # follow broker logs
#   docker compose down -v                  # stop + clean volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Apache Kafka (KRaft mode — no Zookeeper) ─────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: iot-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_CLUSTER_ID=5L6g3nShT-eMCtK--X86sw
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── MongoDB (Time Series + TTL) ──────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: iot-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-admin12345}
    command: [ "--setParameter", "ttlMonitorSleepSecs=60" ] # Check TTL every 60s
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Mongo Express (Web UI for MongoDB) ───────────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: iot-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASS:-admin12345}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-admin12345}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL (User & Device Management) ───────────────────────────────
  postgres:
    image: postgres:16
    container_name: iot-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iot_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-iot_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./k8s/base/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iot_admin}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PubSub Broker + Query API ──────────────────────────────────────────
  # Architecture: Custom PubSub broker system
  #   TCP :10001 — devices connect with custom binary protocol (3-part auth)
  #   HTTP :8080 — telemetry query API (FastAPI)
  broker:
    build:
      context: ./services/PubSub_Server
      dockerfile: Dockerfile
    container_name: iot-broker
    ports:
      - "10001:10001" # TCP broker (ESP32 devices connect here)
      - "8080:8080" # Query API (dashboard/backend queries telemetry)
    environment:
      - BROKER_HOST=0.0.0.0
      - BROKER_PORT=10001
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MONGO_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-admin12345}@mongodb:27017
      - MONGO_DB=${MONGO_DB:-iot-platform}
      - MONGO_TTL_SECONDS=${MONGO_TTL_SECONDS:-2592000}
      - API_HOST=0.0.0.0
      - API_PORT=8080
      - STUB_AUTH=${STUB_AUTH:-true}
      - AUTH_VERIFY_URL=${AUTH_VERIFY_URL:-http://iot-backend:8000/internal/verify-credentials}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      iot-backend:
        condition: service_started
    restart: unless-stopped

  # ── IoT Backend (FastAPI) ───────────────────────────────────────────────
  iot-backend:
    build:
      context: ./services/iot-backend
      dockerfile: Dockerfile
    container_name: iot-backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_DSN=postgresql+asyncpg://${POSTGRES_USER:-iot_admin}:${POSTGRES_PASSWORD:-secure_password_123}@postgres:5432/${POSTGRES_DB:-iot_platform}
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-admin12345}@mongodb:27017
      - MONGODB_DB=${MONGO_DB:-iot-platform}
      - KAFKA_BOOTSTRAP=kafka:9092
      - BACKEND_SECRET_KEY=${BACKEND_SECRET_KEY:-change_me}
      - BACKEND_ALGORITHM=HS256
      - BACKEND_ACCESS_TOKEN_EXPIRE_MINUTES=15
      - BACKEND_REFRESH_TOKEN_EXPIRE_DAYS=7
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Telemetry Worker (Kafka → MongoDB) ──────────────────────────────────
  telemetry-worker:
    build:
      context: ./services/telemetry-worker
      dockerfile: Dockerfile
    container_name: iot-telemetry-worker
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-admin12345}@mongodb:27017
      - TELEMETRY_RETENTION_DAYS=${MONGO_TTL_DAYS:-30}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ── Web App (React + Nginx) ─────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: iot-web
    ports:
      - "3000:80"
    depends_on:
      iot-backend:
        condition: service_started
    restart: unless-stopped

volumes:
  kafka_data:
    driver: local
  mongodb_data:
    driver: local
  postgres_data:
    driver: local
