global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'namespace']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 5m
    - match:
        severity: warning
      receiver: 'warning'
      repeat_interval: 30m

receivers:
  - name: 'default'
    # Configure your notification channel (Slack, email, PagerDuty, etc.)
    # Example Slack config:
    # slack_configs:
