name: CI Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "asset/**"
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/iot

jobs:
  # ── Python Services: Lint + Test ──────────────────────────
  # Services: iot-backend, PubSub_Server, telemetry-worker
  # (No ttl-cleanup-worker — MongoDB TTL handles data expiry natively)
  lint-test-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - iot-backend
          - PubSub_Server
          - telemetry-worker
    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-cov pytest-asyncio

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy . --ignore-missing-imports
        continue-on-error: true

      - name: Test (pytest)
        run: pytest --cov --cov-report=xml -v
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.xml
          retention-days: 7

  # ── Frontend: Lint + Build ─────────────────────────────────
  lint-test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint
        continue-on-error: true

      - name: Test (vitest)
        run: npm run test -- --run
        continue-on-error: true

      - name: Build check
        run: npm run build

  # ── Firmware: Compile Check ───────────────────────────────
  firmware-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Compile firmware
        run: pio run
        working-directory: firmware
        continue-on-error: true

  # ── Build Docker Images + Push to GHCR ────────────────────
  # Architecture: 2 subsystems
  #   Subsystem 1 (Broker): PubSub_Server, telemetry-worker
  #   Subsystem 2 (App):    iot-backend, web-app
  build-push:
    needs: [lint-test-python, lint-test-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          # Subsystem 1 — Custom PubSub broker system
          - service: pubsub-broker
            context: services/PubSub_Server
          - service: telemetry-worker
            context: services/telemetry-worker
          # Subsystem 2 — IoT backend application
          - service: iot-backend
            context: services/iot-backend
          - service: web-app
            context: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security Scan (Trivy) ─────────────────────────────────
  security-scan:
    needs: [build-push]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      packages: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - pubsub-broker
          - telemetry-worker
          - iot-backend
          - web-app

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          format: sarif
          output: trivy-results-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
