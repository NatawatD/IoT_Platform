name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/iot

jobs:
  # ── Python Services: Lint + Test ──────────────────────────
  lint-test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - iot-backend
          - pubsub-broker
          - telemetry-worker
          - ttl-cleanup-worker
    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-cov pytest-asyncio

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy . --ignore-missing-imports
        continue-on-error: true

      - name: Test (pytest)
        run: pytest --cov --cov-report=xml -v
        continue-on-error: true

  # ── Frontend: Lint + Test ─────────────────────────────────
  lint-test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint
        continue-on-error: true

      - name: Test (vitest)
        run: npm run test -- --run
        continue-on-error: true

  # ── Firmware: Compile Check ───────────────────────────────
  firmware-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Compile firmware
        run: pio run
        working-directory: firmware
        continue-on-error: true

  # ── Build Docker Images + Push to GHCR ────────────────────
  build-push:
    needs: [lint-test-python, lint-test-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: iot-backend
            context: services/iot-backend
          - service: pubsub-broker
            context: services/pubsub-broker
          - service: telemetry-worker
            context: services/telemetry-worker
          - service: ttl-cleanup-worker
            context: services/ttl-cleanup-worker
          - service: web-app
            context: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest

  # ── Security Scan (Trivy) ─────────────────────────────────
  security-scan:
    needs: [build-push]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      packages: read

    strategy:
      matrix:
        service:
          - iot-backend
          - pubsub-broker
          - telemetry-worker
          - ttl-cleanup-worker
          - web-app

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
