# LoadBalancer service — ESP32 devices connect here via raw TCP
apiVersion: v1
kind: Service
metadata:
  name: pubsub-broker
  namespace: iot-broker
  labels:
    app: pubsub-broker
spec:
  type: LoadBalancer
  selector:
    app: pubsub-broker
  ports:
    - port: 1883
      targetPort: 1883
      protocol: TCP
      name: tcp-broker
---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: pubsub-broker-headless
  namespace: iot-broker
  labels:
    app: pubsub-broker
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: pubsub-broker
  ports:
    - port: 1883
      targetPort: 1883
      protocol: TCP
      name: tcp-broker
