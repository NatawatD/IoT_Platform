apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: iot-platform

resources:
  # Namespaces
  - namespaces.yaml

  # Shared config
  - configmap.yaml
  # secrets managed manually on server via: kubectl create secret generic iot-secrets --from-env-file=~/IoT_platform/.env
  - ingress.yaml

  # Application services (iot-app namespace)
  - iot-backend/deployment.yaml
  - iot-backend/service.yaml
  - web-app/deployment.yaml
  - web-app/service.yaml

  # Broker services (iot-broker namespace)
  - pubsub-broker/statefulset.yaml
  - pubsub-broker/service.yaml
  - telemetry-worker/deployment.yaml
  - ttl-cleanup-worker/cronjob.yaml

  # Infrastructure (iot-infra namespace)
  - kafka/kafka.yaml
  - postgres/statefulset.yaml
  - postgres/service.yaml
  - mongodb/statefulset.yaml
  - mongodb/service.yaml

  # Monitoring
  - monitoring/namespace.yaml
  - monitoring/prometheus-grafana.yaml

commonLabels:
  project: iot-platform
  managed-by: kustomize
