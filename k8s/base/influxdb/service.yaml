apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: iot-infra
  labels:
    app: influxdb
spec:
  type: ClusterIP
  selector:
    app: influxdb
  ports:
    - port: 8086
      targetPort: 8086
      protocol: TCP
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb-headless
  namespace: iot-infra
  labels:
    app: influxdb
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: influxdb
  ports:
    - port: 8086
      targetPort: 8086
      protocol: TCP
      name: http
