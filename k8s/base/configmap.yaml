apiVersion: v1
kind: ConfigMap
metadata:
  name: iot-config
  namespace: iot-app
data:
  # ── Kafka ──
  KAFKA_BOOTSTRAP_SERVERS: "kafka-0.kafka-headless.iot-infra.svc.cluster.local:9092,kafka-1.kafka-headless.iot-infra.svc.cluster.local:9092,kafka-2.kafka-headless.iot-infra.svc.cluster.local:9092"

  # ── PostgreSQL ──
  POSTGRES_HOST: "postgres.iot-infra.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "iot_platform"
  POSTGRES_USER: "iot_user"

  # ── MongoDB ──
  MONGO_URI: "mongodb://mongodb.iot-infra.svc.cluster.local:27017"
  MONGO_DB: "iot-platform"

  # ── Broker ──
  BROKER_HOST: "0.0.0.0"
  BROKER_PORT: "1883"
  AUTH_VERIFY_URL: "http://iot-backend.iot-app.svc.cluster.local:8000/internal/verify-credentials"

  # ── Application ──
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
---
