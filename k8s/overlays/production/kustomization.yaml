apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namePrefix: prod-

patches:
  # ── Production replicas ──
  - target:
      kind: Deployment
      name: iot-backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

  - target:
      kind: Deployment
      name: web-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

  - target:
      kind: StatefulSet
      name: pubsub-broker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

  - target:
      kind: Deployment
      name: telemetry-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3

  # ── Production Ingress (with TLS) ──
  - target:
      kind: Ingress
      name: iot-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: iot.example.com
      - op: add
        path: /spec/tls
        value:
          - hosts:
              - iot.example.com
            secretName: iot-tls-cert
      - op: add
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-prod

  # ── Higher resource limits for production ──
  - target:
      kind: Deployment
      name: iot-backend
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"

images:
  - name: iot-backend
    newName: ghcr.io/your-org/iot-iot-backend
    newTag: latest
  - name: pubsub-broker
    newName: ghcr.io/your-org/iot-pubsub-broker
    newTag: latest
  - name: telemetry-worker
    newName: ghcr.io/your-org/iot-telemetry-worker
    newTag: latest
  - name: ttl-cleanup-worker
    newName: ghcr.io/your-org/iot-ttl-cleanup-worker
    newTag: latest
  - name: web-app
    newName: ghcr.io/your-org/iot-web-app
    newTag: latest
