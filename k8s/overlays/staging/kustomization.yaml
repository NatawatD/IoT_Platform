apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namePrefix: staging-

patches:
  # ── Scale down for staging ──
  - target:
      kind: Deployment
      name: iot-backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  - target:
      kind: Deployment
      name: web-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  - target:
      kind: StatefulSet
      name: pubsub-broker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  - target:
      kind: Deployment
      name: telemetry-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # ── Staging Ingress host ──
  - target:
      kind: Ingress
      name: iot-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: staging.iot.example.com

images:
  - name: iot-backend
    newName: ghcr.io/your-org/iot-iot-backend
    newTag: latest
  - name: pubsub-broker
    newName: ghcr.io/your-org/iot-pubsub-broker
    newTag: latest
  - name: telemetry-worker
    newName: ghcr.io/your-org/iot-telemetry-worker
    newTag: latest
  - name: ttl-cleanup-worker
    newName: ghcr.io/your-org/iot-ttl-cleanup-worker
    newTag: latest
  - name: web-app
    newName: ghcr.io/your-org/iot-web-app
    newTag: latest
